name: Atom Light
description: Atom Light editor theme

colors:
  white: "#ffffff"
  light_gray: "#f8f8f8"
  lighter_gray: "#f0f0f0"
  medium_light_gray: "#e8f0fe"
  gray: "#e0e0e0"
  medium_gray: "#d0d0d0"
  dark_gray: "#c0c0c0"
  border_gray: "#cccccc"
  muted_gray: "#999999"
  darker_gray: "#666666"
  text_dark: "#333333"
  blue: "#4285f4"
  dark_blue: "#3367d6"
  darker_blue: "#1557b0"
  light_blue: "#e8f0fe"
  link_blue: "#0066cc"
  dark_link_blue: "#004499"
  red: "#ea4335"
  dark_red: "#d93025"
  darker_red: "#b52d20"
  green: "#34a853"
  dark_green: "#2d8f47"
  darker_green: "#1e5f31"
  purple: "#9c27b0"
  dark_purple: "#7b1fa2"
  darker_purple: "#4a148c"
  orange: "#ff6600"
  pink: "#e91e63"
  transparent: "transparent"
  # Modern elevation colors
  elevation1: "#f0f0f0"
  elevation2: "#e8e8e8"
  bubble_user: "#4285f4"
  bubble_assistant: "#ffffff"
  bubble_hover: "#f5f5f5"
  input_bg: "#ffffff"
  input_border: "#d0d0d0"
  input_focus: "#4285f4"
  shadow: "rgba(0, 0, 0, 0.1)"

icons:
  web_search: "\U0001F50D"
  fetch_webpage: "\U0001F310"
  transfer: "\u2197\ufe0f"
  delegate: "\U0001F4CB"
  adapt: "\U0001F9E0"
  retrieve_memory: "\U0001F4AD"
  forget_memory_topic: "\U0001F5D1\ufe0f"
  analyze_repo: "\U0001F4C2"
  get_file: "\U0001F4C4"
  default: "\U0001F527"

styles:
  main: |
    QMainWindow {
        background-color: ${white};
    }
    QScrollArea {
        border: none;
        background-color: ${light_gray};
    }
    QWidget#chatContainer {
        background-color: ${white};
    }
    QSplitter::handle {
        background-color: ${gray};
        width: 4px;
        border-radius: 2px;
    }
    QSplitter::handle:hover {
        background-color: ${medium_gray};
    }
    QSplitter::handle:pressed {
        background-color: ${dark_gray};
    }
    QStatusBar {
        background-color: ${lighter_gray};
        color: ${darker_gray};
        border-top: 1px solid ${gray};
    }
    QToolTip {
        background-color: ${white};
        color: ${text_dark};
        border: 1px solid ${border_gray};
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 12px;
    }
    QMessageBox {
        background-color: ${white};
    }
    QMessageBox QLabel {
        color: ${text_dark};
        background-color: ${transparent};
    }
    QListView {
        background-color: ${white};
        color: ${text_dark};
        border: 1px solid ${border_gray};
        padding: 4px;
        outline: 0px;
        border-radius: 8px;
    }
    QListView::item {
        padding: 6px 10px;
        border-radius: 6px;
    }
    QListView::item:selected {
        background-color: ${blue};
        color: ${white};
    }
    QListView::item:hover {
        background-color: ${light_blue};
    }
    QScrollBar:vertical {
        border: none;
        background: ${transparent};
        width: 8px;
        margin: 4px 2px;
    }
    QScrollBar::handle:vertical {
        background: ${border_gray};
        min-height: 40px;
        border-radius: 4px;
    }
    QScrollBar::handle:vertical:hover {
        background: ${muted_gray};
    }
    QScrollBar::handle:vertical:pressed {
        background: ${darker_gray};
    }
    QScrollBar::add-line:vertical, QScrollBar::sub-line:vertical {
        border: none;
        background: none;
        height: 0px;
    }
    QScrollBar::add-page:vertical, QScrollBar::sub-page:vertical {
        background: none;
    }
    QScrollBar:horizontal {
        border: none;
        background: ${transparent};
        height: 8px;
        margin: 2px 4px;
    }
    QScrollBar::handle:horizontal {
        background: ${border_gray};
        min-width: 40px;
        border-radius: 4px;
    }
    QScrollBar::handle:horizontal:hover {
        background: ${muted_gray};
    }
    QScrollBar::handle:horizontal:pressed {
        background: ${darker_gray};
    }
    QScrollBar::add-line:horizontal, QScrollBar::sub-line:horizontal {
        border: none;
        background: none;
        width: 0px;
    }
    QScrollBar::add-page:horizontal, QScrollBar::sub-page:horizontal {
        background: none;
    }
    QLabel QMenu {
        background-color: ${white};
        border: 1px solid ${border_gray};
        padding: 6px;
        border-radius: 10px;
    }
    QLabel QMenu::item {
        color: ${text_dark};
        padding: 8px 24px 8px 14px;
        border-radius: 6px;
        margin: 2px;
        font-size: 13px;
    }
    QLabel QMenu::item:selected {
        background-color: ${blue};
        color: ${white};
    }
    QLabel QMenu::item:pressed {
        background-color: ${dark_blue};
    }
    QLabel QMenu::separator {
        height: 1px;
        background: ${border_gray};
        margin: 4px 8px;
    }

  button_primary: |
    QPushButton {
        background-color: ${blue};
        color: ${white};
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        font-size: 13px;
    }
    QPushButton:hover {
        background-color: ${dark_blue};
    }
    QPushButton:pressed {
        background-color: ${darker_blue};
    }
    QPushButton:disabled {
        background-color: ${gray};
        color: ${muted_gray};
    }

  button_secondary: |
    QPushButton {
        background-color: ${white};
        color: ${text_dark};
        border: 1px solid ${border_gray};
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        font-size: 13px;
    }
    QPushButton:hover {
        background-color: ${light_gray};
        border-color: ${medium_gray};
    }
    QPushButton:pressed {
        background-color: ${gray};
    }
    QPushButton:disabled {
        background-color: ${lighter_gray};
        color: ${border_gray};
        border-color: ${gray};
    }

  button_stop: |
    QPushButton {
        background-color: ${red};
        color: ${white};
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        font-size: 13px;
    }
    QPushButton:hover {
        background-color: ${dark_red};
    }
    QPushButton:pressed {
        background-color: ${darker_red};
    }

  button_stop_stopping: |
    QPushButton {
        background-color: ${border_gray};
        color: ${darker_gray};
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        font-size: 13px;
    }

  button_red: |
    QPushButton {
        background-color: ${red};
        color: ${white};
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        font-size: 13px;
    }
    QPushButton:hover {
        background-color: ${dark_red};
    }
    QPushButton:pressed {
        background-color: ${darker_red};
    }
    QPushButton:disabled {
        background-color: ${gray};
        color: ${muted_gray};
    }

  button_green: |
    QPushButton {
        background-color: ${green};
        color: ${white};
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        font-size: 13px;
    }
    QPushButton:hover {
        background-color: ${dark_green};
    }
    QPushButton:pressed {
        background-color: ${darker_green};
    }
    QPushButton:disabled {
        background-color: ${gray};
        color: ${muted_gray};
    }

  button_disabled: |
    QPushButton {
        background-color: ${gray};
        color: ${muted_gray};
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        font-size: 13px;
    }

  button_menu: |
    QPushButton {
        background-color: ${blue};
        color: ${white};
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        font-size: 13px;
        padding-left: 14px;
    }
    QPushButton:hover {
        background-color: ${dark_blue};
    }
    QPushButton:pressed {
        background-color: ${darker_blue};
    }
    QPushButton:disabled {
        background-color: ${gray};
        color: ${muted_gray};
    }
    QPushButton::menu-indicator {
        subcontrol-origin: padding;
        subcontrol-position: right center;
        right: 6px;
        width: 16px;
    }

  button_agent_menu: |
    QPushButton {
        background-color: ${blue};
        color: ${white};
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        font-size: 13px;
        padding-left: 14px;
    }
    QPushButton:hover {
        background-color: ${dark_blue};
    }
    QPushButton:pressed {
        background-color: ${darker_blue};
    }
    QPushButton:disabled {
        background-color: ${gray};
        color: ${muted_gray};
    }
    QPushButton::menu-indicator {
        subcontrol-origin: padding;
        subcontrol-position: right center;
        right: 6px;
        width: 16px;
    }

  button_rollback: |
    QPushButton {
        background-color: ${border_gray};
        color: ${text_dark};
        border: none;
        border-radius: 8px;
        padding: 6px;
        font-size: 14px;
        font-weight: 600;
        width: 28px;
        height: 28px;
    }
    QPushButton:hover {
        background-color: ${purple};
        color: ${white};
    }
    QPushButton:pressed {
        background-color: ${dark_purple};
    }

  button_consolidated: |
    QPushButton {
        background-color: ${border_gray};
        color: ${text_dark};
        border: none;
        border-radius: 8px;
        padding: 6px;
        font-size: 12px;
        font-weight: 600;
        width: 28px;
        height: 28px;
    }
    QPushButton:hover {
        background-color: ${purple};
        color: ${white};
    }
    QPushButton:pressed {
        background-color: ${dark_purple};
    }

  button_unconsolidate: |
    QPushButton {
        background-color: ${border_gray};
        color: ${text_dark};
        border: none;
        border-radius: 8px;
        padding: 6px;
        font-size: 12px;
        font-weight: 600;
        width: 28px;
        height: 28px;
    }
    QPushButton:hover {
        background-color: ${red};
        color: ${white};
    }
    QPushButton:pressed {
        background-color: ${dark_red};
    }

  api_keys_group: |
    QGroupBox {
        background-color: ${white};
    }
    QLabel {
        background-color: ${white};
    }

  editor_container_widget: |
    QWidget {
        background-color: ${light_gray};
    }

  combo_box: |
    QComboBox {
        background-color: ${white};
        color: ${text_dark};
        border: 1px solid ${border_gray};
        border-radius: 4px;
        padding: 6px 8px;
        min-width: 120px;
    }
    QComboBox:hover {
        border: 1px solid ${muted_gray};
    }
    QComboBox:focus {
        border: 1px solid ${blue};
    }
    QComboBox::drop-down {
        subcontrol-origin: padding;
        subcontrol-position: top right;
        width: 20px;
        border-left-width: 1px;
        border-left-color: ${border_gray};
        border-left-style: solid;
        border-top-right-radius: 4px;
        border-bottom-right-radius: 4px;
        background-color: ${lighter_gray};
    }
    QComboBox::down-arrow {
        width: 0;
        height: 0;
        border-left: 4px solid ${transparent};
        border-right: 4px solid ${transparent};
        border-top: 6px solid ${text_dark};
    }
    QComboBox QAbstractItemView {
        background-color: ${white};
        color: ${text_dark};
        border: 1px solid ${border_gray};
        border-radius: 4px;
        selection-background-color: ${blue};
        selection-color: ${white};
        outline: 0px;
    }

  text_input: |
    QTextEdit {
        background-color: ${input_bg};
        color: ${text_dark};
        border: 1px solid ${input_border};
        border-radius: 14px;
        padding: 12px 16px;
        font-size: 14px;
        line-height: 1.5;
    }
    QTextEdit:focus {
        border: 1px solid ${input_focus};
    }

  line_edit: |
    QLineEdit {
        background-color: ${input_bg};
        color: ${text_dark};
        border: 1px solid ${input_border};
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 13px;
    }
    QLineEdit:focus {
        border: 1px solid ${input_focus};
    }

  menu_bar: |
    QMenuBar {
        background-color: ${light_gray};
        color: ${text_dark};
        padding: 4px 8px;
        font-size: 13px;
    }
    QMenuBar::item {
        background-color: ${transparent};
        color: ${text_dark};
        padding: 6px 14px;
        border-radius: 6px;
    }
    QMenuBar::item:selected {
        background-color: ${light_blue};
    }
    QMenuBar::item:pressed {
        background-color: #d2e3fc;
    }
    QMenu {
        background-color: ${white};
        color: ${text_dark};
        border: 1px solid ${border_gray};
        padding: 6px;
        border-radius: 10px;
    }
    QMenu::item {
        padding: 8px 24px 8px 14px;
        border-radius: 6px;
        font-size: 13px;
    }
    QMenu::item:selected {
        background-color: ${blue};
        color: ${white};
    }
    QMenu::separator {
        height: 1px;
        background: ${border_gray};
        margin: 6px 10px;
    }

  context_menu: |
    QMenu {
        background-color: ${white};
        color: ${text_dark};
        border: 1px solid ${border_gray};
        padding: 6px;
        border-radius: 10px;
    }
    QMenu::item {
        padding: 8px 24px 8px 14px;
        border-radius: 6px;
        margin: 2px;
        color: ${text_dark};
        font-size: 13px;
    }
    QMenu::item:selected {
        background-color: ${blue};
        color: ${white};
    }
    QMenu::item:pressed {
        background-color: ${dark_blue};
    }
    QMenu::item:disabled {
        background-color: ${transparent};
        color: ${muted_gray};
    }
    QMenu::separator {
        height: 1px;
        background: ${border_gray};
        margin: 4px 8px;
    }

  agent_menu: |
    QMenu {
        background-color: ${white};
        color: ${text_dark};
        border: 1px solid ${gray};
        border-radius: 10px;
        padding: 6px;
    }
    QMenu::item {
        padding: 8px 20px;
        background-color: ${transparent};
        border-radius: 6px;
        font-size: 13px;
    }
    QMenu::item:selected {
        background-color: ${blue};
        color: ${white};
        border-radius: 6px;
    }
    QMenu::separator {
        height: 1px;
        background-color: ${gray};
        margin-left: 8px;
        margin-right: 8px;
    }

  status_indicator: |
    QLabel {
        background-color: ${white};
        color: ${darker_gray};
        padding: 8px 14px;
        border-radius: 8px;
        font-weight: 500;
        font-size: 12px;
    }

  version_label: |
    QLabel {
        color: ${muted_gray};
        padding: 2px 10px;
        font-size: 11px;
    }

  system_message_toggle_button: |
    QPushButton {
        background-color: ${transparent};
        color: ${link_blue};
        border: none;
        text-align: left;
        padding: 4px;
        font-size: 12px;
        font-weight: 500;
    }
    QPushButton:hover {
        color: ${dark_link_blue};
    }

  sidebar: "background-color: ${light_gray};"

  conversation_list: |
    QListWidget {
        background-color: ${white};
        border: 1px solid ${gray};
        border-radius: 10px;
    }
    QListWidget::item {
        color: ${text_dark};
        background-color: ${white};
        border: none;
        border-bottom: 1px solid ${gray};
        margin: 0px;
        padding: 10px 12px;
        font-size: 13px;
    }
    QListWidget::item:selected {
        background-color: ${blue};
        color: ${white};
    }
    QListWidget::item:hover:!selected {
        background-color: ${light_blue};
    }

  search_box: |
    QLineEdit {
        background-color: ${white};
        color: ${text_dark};
        border: 1px solid ${border_gray};
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 13px;
    }
    QLineEdit:focus {
        border: 1px solid ${blue};
    }

  token_usage: |
    QLabel {
        color: ${muted_gray};
        font-weight: 500;
        padding: 8px 14px;
        background-color: ${white};
        border-top: 1px solid ${gray};
        font-size: 11px;
        letter-spacing: 0.2px;
    }

  token_usage_widget: "background-color: ${lighter_gray};"

  user_bubble: |
    QFrame {
        border-radius: 16px;
        border-top-right-radius: 4px;
        background-color: ${bubble_user};
        border: none;
        padding: 4px;
    }
    QLabel {
        border-width: 0px;
    }

  assistant_bubble: |
    QFrame {
        border-radius: 16px;
        border-top-left-radius: 4px;
        background-color: ${bubble_assistant};
        border: 1px solid ${gray};
        padding: 4px;
    }
    QLabel {
        border-width: 0px;
    }

  thinking_bubble: |
    QFrame {
        border-radius: 16px;
        border-top-left-radius: 4px;
        background-color: ${light_gray};
        border: 1px solid ${border_gray};
        padding: 4px;
    }
    QLabel {
        border-width: 0px;
    }

  consolidated_bubble: |
    QFrame {
        border-radius: 16px;
        background-color: ${white};
        border: 1px solid ${border_gray};
        padding: 4px;
    }

  tool_dialog_text_edit: |
    QTextEdit {
        background-color: ${white};
        color: ${text_dark};
        border: 1px solid ${border_gray};
        border-radius: 4px;
        padding: 8px;
        font-family: monospace;
    }
    QTextEdit:focus {
        border: 1px solid ${blue};
    }

  tool_dialog_yes_button: |
    QPushButton {
        background-color: ${green};
        color: ${white};
        font-weight: bold;
        padding: 6px 14px;
        border: none;
        border-radius: 4px;
    }
    QPushButton:hover {
        background-color: ${dark_green};
    }

  tool_dialog_all_button: |
    QPushButton {
        background-color: ${blue};
        color: ${white};
        font-weight: bold;
        padding: 6px 14px;
        border: none;
        border-radius: 4px;
    }
    QPushButton:hover {
        background-color: ${dark_blue};
    }

  tool_dialog_no_button: |
    QPushButton {
        background-color: ${red};
        color: ${white};
        font-weight: bold;
        padding: 6px 14px;
        border: none;
        border-radius: 4px;
    }
    QPushButton:hover {
        background-color: ${dark_red};
    }

  system_message_label: |
    color: ${darker_gray};
    background: none;
    border: none;
    padding: 2px;

  system_message_toggle: |
    QPushButton {
        background-color: ${transparent};
        color: ${link_blue};
        border: none;
        text-align: left;
        padding: 2px;
    }
    QPushButton:hover {
        color: ${dark_link_blue};
    }

  config_dialog: |
    QDialog {
        background-color: ${white};
        color: ${text_dark};
    }
    QTabWidget::pane {
        border: 1px solid ${gray};
        background-color: ${light_gray};
        border-radius: 4px;
    }
    QTabBar::tab {
        background-color: ${white};
        color: ${text_dark};
        padding: 8px;
        border-top-left-radius: 4px;
        border-top-right-radius: 4px;
        border: 1px solid ${border_gray};
        border-bottom: none;
        margin-right: 2px;
    }
    QTabBar::tab:selected {
        background-color: ${light_gray};
        border-bottom-color: ${light_gray};
        color: ${blue};
    }
    QTabBar::tab:hover:!selected {
        background-color: ${light_blue};
    }
    QPushButton {
        background-color: ${blue};
        color: ${white};
        border: none;
        border-radius: 4px;
        padding: 8px;
        font-weight: bold;
    }
    QPushButton:hover {
        background-color: ${dark_blue};
    }
    QPushButton:pressed {
        background-color: ${darker_blue};
    }
    QPushButton:disabled {
        background-color: ${gray};
        color: ${muted_gray};
    }
    QListWidget {
        background-color: ${white};
        border: 1px solid ${gray};
        border-radius: 4px;
        padding: 4px;
        color: ${text_dark};
    }
    QListWidget::item {
        padding: 6px;
        border-radius: 2px;
        color: ${text_dark};
        background-color: ${white};
    }
    QListWidget::item:selected {
        background-color: ${blue};
        color: ${white};
    }
    QListWidget::item:hover:!selected {
        background-color: ${light_blue};
    }
    QLineEdit, QTextEdit {
        border: 1px solid ${border_gray};
        border-radius: 4px;
        padding: 6px;
        background-color: ${white};
        color: ${text_dark};
    }
    QLineEdit:focus, QTextEdit:focus {
        border: 1px solid ${blue};
    }
    QCheckBox {
        spacing: 8px;
        color: ${text_dark};
    }
    QCheckBox::indicator {
        width: 18px;
        height: 18px;
        border-radius: 3px;
        background-color: ${white};
        border: 2px solid ${border_gray};
    }
    QCheckBox::indicator:checked {
        background-color: ${blue};
        border: 2px solid ${blue};
    }
    QCheckBox::indicator:indeterminate {
        background-color: #ff9800;
        border: 2px solid #ff9800;
        border-radius: 9px;
    }
    QCheckBox::indicator:hover {
        border: 2px solid ${dark_blue};
    }
    QCheckBox::indicator:hover:checked {
        background-color: ${dark_blue};
        border: 2px solid ${dark_blue};
    }
    QCheckBox::indicator:hover:indeterminate {
        background-color: #f57c00;
        border: 2px solid #f57c00;
    }
    QCheckBox::indicator:disabled {
        background-color: #f5f5f5;
        border: 2px solid ${gray};
    }
    QGroupBox {
        font-weight: bold;
        border: 1px solid ${border_gray};
        border-radius: 4px;
        margin-top: 12px;
        padding-top: 12px;
        background-color: ${light_gray};
    }
    QGroupBox::title {
        subcontrol-origin: margin;
        subcontrol-position: top left;
        padding: 0 4px 4px 4px;
        color: ${blue};
        background-color: ${light_gray};
        left: 10px;
    }
    QScrollArea {
        background-color: ${light_gray};
        border: none;
    }
    QScrollArea > QWidget > QWidget {
        background-color: ${light_gray};
