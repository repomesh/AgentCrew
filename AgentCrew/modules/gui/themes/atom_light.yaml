  code_css: |
    table td {border: 1px solid ${border_gray}; padding: 8px 10px;}
    table { border-collapse: collapse; margin: 8px 0; border-radius: 8px; overflow: hidden; }
    table th { background-color: ${lighter_gray}; color: ${text_dark}; font-weight: 600; padding: 8px 10px; text-align: left; }
    table tr:nth-child(even) { background-color: rgba(240, 240, 240, 0.5); }
    pre { line-height: 1; background-color: ${light_gray}; border-radius: 10px; padding: 14px 16px; color: ${text_dark}; white-space: pre-wrap; word-wrap: break-word; margin: 8px 0; font-size: 13px; }
    code { background-color: ${lighter_gray}; border-radius: 4px; padding: 2px 6px; font-size: 13px; color: ${orange}; }
    pre code { background-color: transparent; padding: 0; border-radius: 0; }
    blockquote { border-left: 3px solid ${blue}; margin: 8px 0; padding-left: 14px; color: ${muted_gray}; }
    ul, ol { margin: 8px 0; padding-left: 20px; }
    li { margin: 3px 0; }
    p { margin: 6px 0; }
    h1, h2, h3, h4, h5, h6 { margin: 12px 0 6px 0; font-weight: 600; color: ${dark_blue}; }
    hr { border: none; border-top: 1px solid ${gray}; margin: 12px 0; }
    a { color: ${link_blue}; text-decoration: none; }
    a:hover { text-decoration: underline; }
    td.linenos .normal { color: ${muted_gray}; background-color: transparent; padding-left: 5px; padding-right: 5px; }
    span.linenos { color: ${muted_gray}; background-color: transparent; padding-left: 5px; padding-right: 5px; }
