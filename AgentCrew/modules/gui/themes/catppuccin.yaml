  code_css: |
    table td {border: 1px solid ${surface1}; padding: 8px 10px;}
    table { border-collapse: collapse; margin: 8px 0; border-radius: 8px; overflow: hidden; }
    table th { background-color: ${surface1}; color: ${text}; font-weight: 600; padding: 8px 10px; text-align: left; }
    table tr:nth-child(even) { background-color: rgba(49, 50, 68, 0.4); }
    pre { line-height: 1; background-color: ${mantle}; border-radius: 10px; padding: 14px 16px; color: ${text}; white-space: pre-wrap; word-wrap: break-word; margin: 8px 0; font-size: 13px; }
    code { background-color: ${surface0}; border-radius: 4px; padding: 2px 6px; font-size: 13px; color: ${peach}; }
    pre code { background-color: transparent; padding: 0; border-radius: 0; }
    blockquote { border-left: 3px solid ${blue}; margin: 8px 0; padding-left: 14px; color: ${subtext0}; }
    ul, ol { margin: 8px 0; padding-left: 20px; }
    li { margin: 3px 0; }
    p { margin: 6px 0; }
    h1, h2, h3, h4, h5, h6 { margin: 12px 0 6px 0; font-weight: 600; color: ${lavender}; }
    hr { border: none; border-top: 1px solid ${surface1}; margin: 12px 0; }
    a { color: ${blue}; text-decoration: none; }
    a:hover { text-decoration: underline; }
    td.linenos .normal { color: ${overlay0}; background-color: transparent; padding-left: 5px; padding-right: 5px; }
    span.linenos { color: ${overlay0}; background-color: transparent; padding-left: 5px; padding-right: 5px; }
    td.linenos .special { color: ${text}; background-color: ${surface0}; padding-left: 5px; padding-right: 5px; }
    span.linenos.special { color: ${text}; background-color: ${surface0}; padding-left: 5px; padding-right: 5px; }
    .codehilite .hll { background-color: ${surface0} }
