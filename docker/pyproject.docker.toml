[project]
name = "agentcrew-ai"
version = "0.17.1"
requires-python = ">=3.12"
classifiers = [
  "Programming Language :: Python :: 3",
  "Operating System :: OS Independent",
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
license = "Apache-2.0"
license-files = ["LICENSE"]
description = "Multi-Agents Interactive Chat Tool"
authors = [{ name = "Quy Truong", email = "quy.truong@saigontechnology.com" }]
readme = "README.md"

dependencies = [
  "click==8.3.3",
  "python-dotenv==1.2.2",
  "anthropic==0.97.0",
  "prompt-toolkit==3.0.52",
  "rich==15.0.0",
  "pyperclip==1.11.0",
  "tavily-python==0.7.23",
  "pillow==12.2.0",
  "chromadb==1.5.8",
  "openai==2.36.0",
  "mcp==1.27.1",
  "google-genai==1.73.1",
  "markdown==3.10.2",
  "tree-sitter-language-pack==1.6.2",
  "nest-asyncio==1.6.0",
  "voyageai==0.3.7",
  "numpy==1.26.4; python_version < '3.13' and sys_platform == 'darwin'",
  "pywin32; sys_platform == 'win32'",
  "pyobjc; sys_platform == 'darwin'",
  "a2a-sdk==0.3.26",
  "agent-client-protocol==0.10.0",
  "xmltodict==1.0.4",
  "jsonref==1.1.0",
  "pychromedevtools==1.0.4",
  "html-to-markdown==2.30.0",
  "pip-system-certs==5.3",
  "loguru==0.7.3",
  "jsonschema==4.26.0",
  "tomli-w==1.2.0",
  "pyyaml==6.0.3",
  "together==2.16.0",
]

[project.optional-dependencies]
cpu = [
  "torch==2.11.0",
  "torchvision==0.26.0",
  "torchaudio==2.11.0",
  "docling==2.103.0",
]
nvidia = [
  "torch==2.11.0",
  "torchvision==0.26.0",
  "torchaudio==2.11.0",
  "docling==2.103.0",
]

redis = ["redis==7.4.0"]

[tool.uv]
conflicts = [[{ extra = "cpu" }, { extra = "nvidia" }]]

[tool.uv.sources]
torch = [
  { index = "pytorch-cpu", extra = "cpu" },
  { index = "pytorch-cu128", extra = "nvidia" },
]
torchvision = [
  { index = "pytorch-cpu", extra = "cpu" },
  { index = "pytorch-cu128", extra = "nvidia" },
]

torchaudio = [
  { index = "pytorch-cpu", extra = "cpu" },
  { index = "pytorch-cu128", extra = "nvidia" },
]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[project.urls]
"Homepage" = "https://github.com/saigontechnology/AgentCrew"
"Bug Tracker" = "https://github.com/saigontechnology/AgentCrew/issues"


[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project.scripts]
agentcrew = "AgentCrew.main_docker:cli_prod"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["./"]

[dependency-groups]
dev = [
  "pygments==2.20.0",
  "pyinstaller==6.19.0",
  "langfuse==4.0.1",
  "pytest==9.0.2",
  "pytest-asyncio==1.3.0",
]
